<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VIPER.exe — Snake Roguelike</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:,">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LTSJ5GKL0C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LTSJ5GKL0C');
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <span class="label" id="hud-lbl-apples">APPLES</span>&nbsp;<span id="hud-apples">0</span>
      &nbsp;·&nbsp;
      <span class="label" id="hud-lbl-timer">TIME</span>&nbsp;<span id="hud-timer">0:00</span>
      &nbsp;·&nbsp;
      <span id="hud-perk-bar" style="display:none;align-items:center;gap:6px;"></span>
      <span id="hud-upgrades"></span>
    </div>

    <div style="position:relative;">
      <canvas id="canvas"></canvas>

      <!-- Pause button (solo mode only) -->
      <button id="pause-btn" style="display:none;">⏸</button>

      <!-- Upgrade chooser (shown after each apple) -->
      <div id="upgrade-panel" style="display:none;"></div>

      <!-- Pause menu overlay -->
      <div id="pause-menu" style="display:none;"></div>

      <!-- Start / Game Over overlay -->
      <div id="overlay"></div>
    </div>

    <!-- Mobile joystick control -->
    <div id="mobile-controls">
      <div id="joystick-area">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <div id="gun-joystick-area">
        <div id="gun-joystick-base">
          <div id="gun-joystick-knob"></div>
          <span id="gun-joystick-label">🔫</span>
        </div>
      </div>
      <div id="mobile-teleport-wrap" style="display:none;margin-top:10px;">
        <button id="mobile-teleport-btn" class="btn btn-online">⌁ TELEPORT (0)</button>
      </div>
    </div>

    <!-- Admin password modal -->
    <div id="admin-modal" style="display:none;">
      <div id="admin-modal-box">
        <div id="admin-modal-title">⚙ ADMIN ACCESS</div>
        <input id="admin-pw-input" type="password" class="room-input"
               placeholder="PASSWORD" autocomplete="off" spellcheck="false"
               style="width:180px;letter-spacing:4px;" />
        <div id="admin-pw-error" style="font-size:10px;color:#f55;min-height:14px;"></div>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button class="btn btn-settings" id="admin-login-btn">ENTER</button>
          <button class="btn btn-back" id="admin-cancel-btn">CANCEL</button>
        </div>
      </div>
    </div>

    <!-- Leaderboard removal notification -->
    <div id="removal-notice" style="display:none;">
      <div id="removal-notice-box">
        <div style="font-size:13px;color:#f64;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">⚠ LEADERBOARD NOTICE</div>
        <div style="font-size:12px;color:#aaa;line-height:1.6;">Your leaderboard ranking was removed<br>due to an inappropriate name.</div>
        <button class="btn btn-back" id="removal-notice-ok" style="font-size:10px;padding:4px 14px;margin-top:10px;">OK</button>
      </div>
    </div>

    <!-- Spectate overlay (shown when admin spectates an SP session) -->
    <div id="spectate-overlay" style="display:none;">
      <div id="spectate-box">
        <div id="spectate-title">👁 SPECTATING: <span id="spectate-player-name"></span></div>
        <canvas id="spectate-canvas" width="180" height="180"></canvas>
        <div id="spectate-stats"></div>
        <button class="btn btn-back" id="spectate-close" style="font-size:10px;padding:4px 12px;margin-top:6px;">CLOSE</button>
      </div>
    </div>

    <!-- Admin panel (shown during any gamemode when admin mode is active) -->
    <div id="admin-panel" style="display:none;">
      <div id="admin-panel-title">⚙ ADMIN DEBUG</div>
      <div id="admin-panel-body">
        <button class="admin-action-btn" id="adm-godmode">👻 God Mode</button>
        <button class="admin-action-btn" id="adm-shield">🛡 +1 Shield</button>
        <button class="admin-action-btn" id="adm-apple"><img src="sprites/APPLER.png" style="width:14px;height:14px;vertical-align:middle;"> +5 Apples</button>
        <button class="admin-action-btn" id="adm-score">⭐ +500 Score</button>
        <button class="admin-action-btn" id="adm-speed">⚡ Speed Up</button>
        <button class="admin-action-btn" id="adm-slow">🕰 Slow Down</button>
        <button class="admin-action-btn" id="adm-clear">💀 Clear Enemies</button>
        <button class="admin-action-btn" id="adm-upgrade">🎁 Force Upgrade</button>
        <button class="admin-action-btn" id="adm-nightmare-toggle">☠ Toggle Nightmare</button>
        <div id="adm-sp-sessions-section" style="margin-top:8px;width:100%;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div style="font-size:10px;color:#47a;letter-spacing:1px;">🎮 SP SESSIONS</div>
            <button id="adm-sp-refresh" style="background:#0a0a1a;border:1px solid #246;color:#47a;font-family:'Courier New',monospace;font-size:9px;padding:1px 6px;cursor:pointer;border-radius:3px;">↻ Refresh</button>
          </div>
          <div id="adm-sp-sessions-list" style="font-size:10px;color:#7ab;"></div>
        </div>
        <div id="adm-leaderboard-section" style="margin-top:8px;width:100%;">
          <div style="font-size:10px;color:#567;letter-spacing:1px;margin-bottom:4px;">🏆 LEADERBOARD</div>
          <div id="adm-leaderboard-list" style="font-size:10px;color:#7ab;"></div>
        </div>
        <div id="adm-nm-leaderboard-section" style="margin-top:8px;width:100%;">
          <div style="font-size:10px;color:#933;letter-spacing:1px;margin-bottom:4px;">☠ NIGHTMARE LEADERBOARD</div>
          <div id="adm-nm-leaderboard-list" style="font-size:10px;color:#c77;"></div>
        </div>
      </div>
      <button class="btn btn-back" id="admin-panel-close" style="font-size:10px;padding:4px 12px;">CLOSE</button>
    </div>
  </div>

  <script src="game.js"></script>
  <!-- Admin open button: shown on main menu; remains visible during gameplay when admin is authenticated -->
  <button id="admin-open-btn" style="display:none;">⚙ ADMIN</button>
</body>
</html>
