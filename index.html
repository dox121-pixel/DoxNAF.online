<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIPER.exe — Snake Roguelike</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:,">
</head>
<body>
  <div id="app">
    <div id="hud">
      <span class="label" id="hud-lbl-apples">APPLES</span>&nbsp;<span id="hud-apples">0</span>
      &nbsp;·&nbsp;
      <span class="label" id="hud-lbl-timer">TIME</span>&nbsp;<span id="hud-timer">0:00</span>
      &nbsp;·&nbsp;
      <span id="hud-upgrades"></span>
    </div>

    <div style="position:relative;">
      <canvas id="canvas"></canvas>

      <!-- Upgrade chooser (shown after each apple) -->
      <div id="upgrade-panel" style="display:none;"></div>

      <!-- Start / Game Over overlay -->
      <div id="overlay"></div>
    </div>

    <!-- Mobile joystick control -->
    <div id="mobile-controls">
      <div id="joystick-area">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <div id="gun-joystick-area">
        <div id="gun-joystick-base">
          <div id="gun-joystick-knob"></div>
          <span id="gun-joystick-label">🔫</span>
        </div>
      </div>
      <div id="mobile-teleport-wrap" style="display:none;margin-top:10px;">
        <button id="mobile-teleport-btn" class="btn btn-online">⌁ TELEPORT (0)</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
