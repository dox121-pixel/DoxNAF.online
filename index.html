<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VIPER.exe — Snake Roguelike</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:,">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LTSJ5GKL0C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LTSJ5GKL0C');
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <span class="label" id="hud-lbl-apples">APPLES</span>&nbsp;<span id="hud-apples">0</span>
      &nbsp;·&nbsp;
      <span class="label" id="hud-lbl-timer">TIME</span>&nbsp;<span id="hud-timer">0:00</span>
      &nbsp;·&nbsp;
      <span id="hud-upgrades"></span>
    </div>

    <div style="position:relative;">
      <canvas id="canvas"></canvas>

      <!-- Upgrade chooser (shown after each apple) -->
      <div id="upgrade-panel" style="display:none;"></div>

      <!-- Start / Game Over overlay -->
      <div id="overlay"></div>
    </div>

    <!-- Mobile joystick control -->
    <div id="mobile-controls">
      <div id="joystick-area">
        <div id="joystick-base">
          <div id="joystick-knob"></div>
        </div>
      </div>
      <div id="gun-joystick-area">
        <div id="gun-joystick-base">
          <div id="gun-joystick-knob"></div>
          <span id="gun-joystick-label">🔫</span>
        </div>
      </div>
      <div id="mobile-teleport-wrap" style="display:none;margin-top:10px;">
        <button id="mobile-teleport-btn" class="btn btn-online">⌁ TELEPORT (0)</button>
      </div>
    </div>

    <!-- Admin password modal -->
    <div id="admin-modal" style="display:none;">
      <div id="admin-modal-box">
        <div id="admin-modal-title">⚙ ADMIN ACCESS</div>
        <input id="admin-pw-input" type="password" class="room-input"
               placeholder="PASSWORD" autocomplete="off" spellcheck="false"
               style="width:180px;letter-spacing:4px;" />
        <div id="admin-pw-error" style="font-size:10px;color:#f55;min-height:14px;"></div>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button class="btn btn-settings" id="admin-login-btn">ENTER</button>
          <button class="btn btn-back" id="admin-cancel-btn">CANCEL</button>
        </div>
      </div>
    </div>

    <!-- Admin panel (shown during any gamemode when admin mode is active) -->
    <div id="admin-panel" style="display:none;">
      <div id="admin-panel-title">⚙ ADMIN DEBUG</div>
      <div id="admin-panel-body">
        <button class="admin-action-btn" id="adm-godmode">👻 God Mode</button>
        <button class="admin-action-btn" id="adm-shield">🛡 +1 Shield</button>
        <button class="admin-action-btn" id="adm-apple">🍎 +5 Apples</button>
        <button class="admin-action-btn" id="adm-score">⭐ +500 Score</button>
        <button class="admin-action-btn" id="adm-speed">⚡ Speed Up</button>
        <button class="admin-action-btn" id="adm-slow">🕰 Slow Down</button>
        <button class="admin-action-btn" id="adm-clear">💀 Clear Enemies</button>
        <button class="admin-action-btn" id="adm-upgrade">🎁 Force Upgrade</button>
      </div>
      <button class="btn btn-back" id="admin-panel-close" style="font-size:10px;padding:4px 12px;">CLOSE</button>
    </div>
  </div>

  <script src="game.js"></script>
  <!-- Admin open button: shown on main menu; remains visible during gameplay when admin is authenticated -->
  <button id="admin-open-btn" style="display:none;">⚙ ADMIN</button>
</body>
</html>
