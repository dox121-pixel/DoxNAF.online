  <style>
    /* ══════════════════════════════════════════════════
       TOKENS
    ══════════════════════════════════════════════════ */
    :root {
      --bg:           #100d08;
      --bg2:          #1a160f;
      --bg3:          #251e14;
      --border:       rgba(200, 155, 65, 0.14);
      --border-focus: rgba(200, 155, 65, 0.36);
      --text-dim:     #3e3428;
      --text-correct: #c4b090;
      --text-wrong-bg: rgba(190, 60, 40, 0.28);
      --text-wrong:   #d46e58;
      --cursor:       #d4a060;
      --accent:       #d4a060;
      --accent-lt:    #e8c080;
      --muted:        #8a7560;
      --stat-val:     #e8c080;
      --r:            14px;
      --font-mono:    'JetBrains Mono', 'Courier New', monospace;
      --font-sans:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ══════════════════════════════════════════════════
       RESET
    ══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ══════════════════════════════════════════════════
       BASE
    ══════════════════════════════════════════════════ */
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 110% 70% at 50% 110%, rgba(180, 108, 22, 0.24) 0%, transparent 58%),
        radial-gradient(ellipse 55% 45% at 88% 8%,   rgba(155, 88, 18, 0.11) 0%, transparent 52%),
        radial-gradient(ellipse 40% 35% at 8%  30%,  rgba(95,  68, 18, 0.09) 0%, transparent 50%);
      color: var(--text-correct);
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ══════════════════════════════════════════════════
       NAV
    ══════════════════════════════════════════════════ */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 58px;
      padding: 0 clamp(16px, 4vw, 60px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(16, 13, 8, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.2px;
      opacity: 0.80;
      transition: opacity 0.18s;
    }
    .nav-logo:hover { opacity: 1; }
    .nav-crumb {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    /* ══════════════════════════════════════════════════
       MAIN / LAYOUT
    ══════════════════════════════════════════════════ */
    main {
      min-height: 100vh;
      padding: 58px 0 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .game-wrapper {
      width: 100%;
      max-width: 840px;
      padding: 0 clamp(16px, 4vw, 40px);
      animation: fade-up 0.55s ease-out both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════════════ */
    .game-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .game-title {
      font-size: clamp(24px, 3.8vw, 36px);
      font-weight: 700;
      color: var(--accent-lt);
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }
    .game-subtitle {
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
    }

    /* ══════════════════════════════════════════════════
       MODE SELECTOR
    ══════════════════════════════════════════════════ */
    .mode-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 26px;
    }
    .mode-btn {
      padding: 6px 20px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.5px;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50px;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s, background 0.18s;
    }
    .mode-btn:hover {
      color: var(--accent-lt);
      border-color: var(--border-focus);
    }
    .mode-btn.active {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }

    /* ══════════════════════════════════════════════════
       STATS BAR
    ══════════════════════════════════════════════════ */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: clamp(22px, 5vw, 60px);
      margin-bottom: 20px;
      align-items: flex-start;
    }
    .stat {
      text-align: center;
      min-width: 54px;
    }
    .stat-val {
      font-size: clamp(26px, 3.8vw, 38px);
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--stat-val);
      line-height: 1.1;
      transition: color 0.25s;
    }
    .stat-val.dim { color: var(--text-dim); }
    .stat-val.timer-low {
      color: #e07055 !important;
      animation: timer-pulse 0.55s ease-in-out infinite;
    }
    @keyframes timer-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ══════════════════════════════════════════════════
       TEXT AREA
    ══════════════════════════════════════════════════ */
    .text-area-outer {
      position: relative;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: rgba(255, 200, 100, 0.022);
      padding: 32px 34px 32px;
      cursor: text;
      transition: border-color 0.22s, box-shadow 0.22s;
    }
    .text-area-outer.focused {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(200, 155, 65, 0.07), 0 8px 28px rgba(0,0,0,0.32);
    }

    /* Scroll mask — shows ~3 lines */
    .text-scroll-mask {
      height: 5.5em;
      overflow: hidden;
      position: relative;
    }

    /* Top/bottom fade-out gradients */
    .text-area-outer::before,
    .text-area-outer::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 38px;
      pointer-events: none;
      z-index: 2;
    }
    .text-area-outer::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(16,13,8,0.75), transparent);
      border-radius: var(--r) var(--r) 0 0;
    }
    .text-area-outer::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(16,13,8,0.75), transparent);
      border-radius: 0 0 var(--r) var(--r);
    }

    .text-block {
      font-family: var(--font-mono);
      font-size: clamp(17px, 2.2vw, 21px);
      line-height: 1.80;
      white-space: pre-wrap;
      word-break: break-word;
      transition: transform 0.12s ease;
    }

    /* ── Character states ── */
    .char {
      position: relative;
      color: var(--text-dim);
    }
    .char.correct { color: var(--text-correct); }
    .char.wrong {
      color: var(--text-wrong);
      background: var(--text-wrong-bg);
      border-radius: 2px;
    }
    .char.wrong.spc {
      background: rgba(190, 60, 40, 0.38);
      border-bottom: 2px solid var(--text-wrong);
    }
    /* Blinking caret before current character */
    .char.current::before {
      content: '';
      position: absolute;
      left: -1px;
      top: 10%;
      height: 80%;
      width: 2px;
      background: var(--cursor);
      border-radius: 1px;
      animation: blink-caret 1.05s ease-in-out infinite;
      box-shadow: 0 0 7px rgba(212, 160, 96, 0.85);
    }
    @keyframes blink-caret {
      0%, 42%  { opacity: 1; }
      58%, 100% { opacity: 0; }
    }

    /* Word-completion ripple glow */
    @keyframes word-ripple {
      0%   { color: var(--accent-lt); text-shadow: 0 0 10px rgba(232, 192, 128, 0.9); }
      100% { color: var(--text-correct); text-shadow: none; }
    }
    .char.ripple { animation: word-ripple 0.38s ease-out forwards; }

    /* ── Focus hint overlay ── */
    .focus-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--muted);
      background: rgba(16, 13, 8, 0.68);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: var(--r);
      transition: opacity 0.22s;
      z-index: 10;
      letter-spacing: 0.25px;
      gap: 8px;
    }
    .focus-hint.hidden { opacity: 0; pointer-events: none; }

    /* ══════════════════════════════════════════════════
       KEYBOARD HINTS
    ══════════════════════════════════════════════════ */
    .kb-hints {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .kb-hint {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .kb-key {
      padding: 2px 7px;
      background: var(--bg3);
      border: 1px solid rgba(200,155,65,0.09);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* ══════════════════════════════════════════════════
       RESULTS OVERLAY
    ══════════════════════════════════════════════════ */
    .results-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 6, 3, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s;
    }
    .results-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .results-card {
      background: var(--bg2);
      border: 1px solid var(--border-focus);
      border-radius: 22px;
      padding: clamp(28px, 4vw, 50px) clamp(28px, 6vw, 64px);
      text-align: center;
      box-shadow: 0 28px 90px rgba(0,0,0,0.65);
      transform: scale(0.90) translateY(18px);
      transition: transform 0.32s cubic-bezier(0.18, 0.85, 0.28, 1.05);
      max-width: 440px;
      width: calc(100% - 40px);
    }
    .results-overlay.visible .results-card {
      transform: scale(1) translateY(0);
    }

    .results-emoji {
      font-size: 44px;
      display: block;
      margin-bottom: 10px;
      animation: float-emoji 2.2s ease-in-out infinite;
    }
    @keyframes float-emoji {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }

    .results-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-lt);
      margin-bottom: 26px;
    }

    .results-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 30px;
    }
    .result-item { text-align: center; }
    .result-val {
      font-size: 38px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--stat-val);
      line-height: 1.1;
    }
    .result-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--muted);
      margin-top: 3px;
    }

    .results-play-again {
      padding: 12px 36px;
      font-size: 14px;
      font-weight: 600;
      color: var(--bg);
      background: var(--accent);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
      letter-spacing: 0.2px;
    }
    .results-play-again:hover {
      background: var(--accent-lt);
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(200, 155, 65, 0.38);
    }

    /* ══════════════════════════════════════════════════
       DUST PARTICLES
    ══════════════════════════════════════════════════ */
    .dust-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .dust {
      position: absolute;
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: rgba(210, 166, 76, var(--o));
      animation: dust-float var(--d) var(--dl) linear infinite;
    }
    @keyframes dust-float {
      0%   { transform: translate(0, 100vh); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translate(var(--dx), -80px); opacity: 0; }
    }

    /* ══════════════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════════════ */
    @media (max-width: 560px) {
      .text-area-outer { padding: 22px 18px; }
      .text-scroll-mask { height: 6em; }
      .stats-bar { gap: 20px; }
      .results-stats { gap: 18px; }
    }
  </style>
</head>
<body>

  <!-- ══ DUST PARTICLES ══ -->
  <div class="dust-layer" id="dustLayer"></div>

  <!-- ══ NAV ══ -->
  <nav>

  <!-- ══ RESULTS OVERLAY ══ -->
  <div class="results-overlay" id="resultsOverlay">

          <div class="result-label">Chars</div>

      </div>

    </div>
  </div>

  <!-- Hidden input for mobile keyboard support -->
  <input
    id="hiddenInput"
    type="text"
    autocomplete="new-password"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    aria-hidden="true"
    tabindex="-1"
    style="position:fixed;opacity:0;width:1px;height:1px;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:-1;caret-color:transparent;color:transparent;border:none;outline:none;background:transparent;"
  />

  <script>
  /* ═══════════════════════════════════════════════════════════════
     COZY TYPE  ·  DoxNAF.online
     A warm, creamy typing speed test with Web Audio key sounds.
  ═══════════════════════════════════════════════════════════════ */

  // ─── Audio Engine ────────────────────────────────────────────
  let _audioCtx = null;
  function getCtx() {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    return _audioCtx;
  }

  /**
   * Creamy key click — filtered noise burst + warm sine drop.
   * Correct keys are higher/brighter; wrong keys are lower/duller.
   */
  function playKeySound(correct) {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;

      // ── Noise "body" (the creamy thock) ──────────────────────
      const len = Math.floor(ctx.sampleRate * 0.072);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * 0.20));
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buf;

      // Band-pass filter: warm, rounded, not clicky
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = correct ? 370 : 245;
      bp.Q.value = 1.6;

      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(correct ? 0.24 : 0.17, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.065);

      noise.connect(bp);
      bp.connect(noiseGain);
      noiseGain.connect(ctx.destination);
      noise.start(now);
      noise.stop(now + 0.08);

      // ── Tonal warmth (the deep "cream") ──────────────────────
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(correct ? 295 : 205, now);
      osc.frequency.exponentialRampToValueAtTime(correct ? 155 : 105, now + 0.055);

      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(correct ? 0.075 : 0.052, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.055);

      osc.connect(oscGain);
      oscGain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.06);
    } catch (_) { /* silently swallow any audio errors */ }
  }

  /**
   * Word-complete chime — soft ascending arpeggio: C5 · E5 · G5
   */
  function playWordChime() {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const t = now + i * 0.075;
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.10, t + 0.012);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 0.26);
      });
    } catch (_) {}
  }

  /**
   * Finish fanfare — full ascending chord: C5 · E5 · G5 · C6
   */
  function playFinish() {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;
      [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
        const t = now + i * 0.10;
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const g = ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.13, t + 0.015);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 0.58);
      });
    } catch (_) {}
  }

  // ─── Cozy passages ───────────────────────────────────────────
  const PASSAGES = [
    "The kettle hummed softly on the stove as rain traced gentle lines down the window glass. She curled deeper into the armchair, a book open on her lap but forgotten for the moment. Outside, the world was damp and grey, but in here everything was amber and warm. The cat slept near the radiator, breathing slowly, perfectly content.",

    "Autumn had settled in overnight without asking permission. The maple in the backyard had gone from green to amber between one Tuesday and the next, and now its leaves came down in slow spirals whenever the wind remembered to blow. He stood at the kitchen door with his coffee and watched one leaf take nearly a full minute to reach the ground. He decided that was a good sign.",

    "The old bookshop smelled of vanilla and cedar. Every shelf held a quiet adventure waiting for the right reader. She ran her fingers along the spines, reading titles in a slow murmur, until one felt like it had been waiting just for her. She carried it to the nook by the window and settled in as the afternoon light shifted to gold.",

    "Soft candlelight flickered across the journal pages. Outside, the street was busy, but in this corner of the cafe, time moved gently. She wrote about small things, because small things were the ones that lasted. The scratch of pen on paper was the only sound that mattered right now, steady and unhurried.",

    "Morning fog settled low over the meadow, blurring the edges of the world into something soft and dreamlike. The birds were the only ones awake, and they seemed content to keep it a quiet secret. She poured tea from a thermos and sat on the wooden gate, watching the mist slowly give way to pale gold light.",

    "He made tea the slow way, letting the leaves steep while he watched the steam curl upward in tiny, lazy spirals. Some routines are not habits but rituals, and this was one of them. The clock on the wall ticked softly. He had nowhere to be, and that feeling had gradually become the most comfortable thing he knew.",

    "The library was warmest in the far corner, near the radiator that clicked and hissed all winter long. She had claimed that spot with a blanket and a stack of books on the first cold day of the season, and no one had challenged her since. It was the kind of place where hours disappeared gently, like snow off warm glass.",

    "They sat on the porch as the sun went down, not talking much but not needing to. The fireflies were starting up in the tall grass at the edge of the yard, and the air smelled faintly of clover and something just before rain. Neither of them moved to go inside for a long time. It felt too good to leave.",

    "She baked bread on slow Sundays, not because she had to but because the whole process felt meditative. The kneading, the waiting, the soft yeasty warmth filling every corner of the apartment. When it was done she ate the first piece still warm, standing at the counter with nothing but a little butter and the quiet satisfaction of something made by hand.",

    "The snow had started sometime in the night and by morning the whole neighborhood looked like it had been invented fresh. The kids were already in the yards, making things. The dog did not understand snow at all and stuck her nose into a drift with an expression of pure baffled delight. It was early enough that no cars had driven anywhere yet.",

    "He found the old record player at the back of an estate sale, wrapped in a flannel shirt as if someone had put it to bed. It was heavier than he expected, and there was still a record on the platter. He carried it home, set it on the kitchen table, and lowered the needle without cleaning it first. Whatever crackled out was exactly right.",

    "Rain on a tin roof is one of the great underrated pleasures. She had lived in the city too long, she decided, and had forgotten how weather could make a small house feel like shelter rather than just a building. She listened to it now with her eyes half closed, grateful for the sound, grateful for the roof, grateful for being inside while something fell outside.",
  ];

  // ─── Game State ──────────────────────────────────────────────
  const S = {
    text:      '',
    chars:     [],     // expected characters
    status:    [],     // null | 'correct' | 'wrong'
    pos:       0,      // cursor index
    startTime: null,
    timerSec:  30,     // chosen mode
    timeLeft:  30,
    timerInt:  null,
    statsInt:  null,
    phase:     'idle', // 'idle' | 'active' | 'finished'
    focused:   false,
  };

  // ─── DOM refs ────────────────────────────────────────────────
  const $textBlock  = document.getElementById('textBlock');
  const $timerVal   = document.getElementById('timerVal');
  const $wpmVal     = document.getElementById('wpmVal');
  const $accVal     = document.getElementById('accVal');
  const $focusHint  = document.getElementById('focusHint');
  const $textOuter  = document.getElementById('textAreaOuter');
  const $results    = document.getElementById('resultsOverlay');
  const $rWpm       = document.getElementById('rWpm');
  const $rAcc       = document.getElementById('rAcc');
  const $rChars     = document.getElementById('rChars');
  const $playAgain  = document.getElementById('playAgainBtn');
  const $hidden     = document.getElementById('hiddenInput');

  // ─── Text rendering ──────────────────────────────────────────
  function loadPassage() {
    S.text   = PASSAGES[Math.floor(Math.random() * PASSAGES.length)];
    S.chars  = Array.from(S.text);
    S.status = new Array(S.chars.length).fill(null);
    S.pos    = 0;
  }

  function renderText() {
    $textBlock.innerHTML = '';
    S.chars.forEach((ch, i) => {
      const span = document.createElement('span');
      span.className = 'char';
      span.id = `c${i}`;
      // Use non-breaking space so spaces are visible / have width
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      if (S.status[i] === 'correct') {
        span.classList.add('correct');
      } else if (S.status[i] === 'wrong') {
        span.classList.add('wrong');
        if (ch === ' ') span.classList.add('spc');
      }
      if (i === S.pos && S.phase !== 'finished') span.classList.add('current');
      $textBlock.appendChild(span);
    });
    scrollToCursor();
  }

  function setCharClass(i) {
    const span = document.getElementById(`c${i}`);
    if (!span) return;
    span.className = 'char';
    if (S.status[i] === 'correct') {
      span.classList.add('correct');
    } else if (S.status[i] === 'wrong') {
      span.classList.add('wrong');
      if (S.chars[i] === ' ') span.classList.add('spc');
    }
    if (i === S.pos && S.phase !== 'finished') span.classList.add('current');
  }

  function moveCursor(from, to) {
    const prev = document.getElementById(`c${from}`);
    if (prev) prev.classList.remove('current');
    const next = document.getElementById(`c${to}`);
    if (next && S.phase !== 'finished') next.classList.add('current');
    scrollToCursor();
  }

  function scrollToCursor() {
    const cur = document.getElementById(`c${S.pos}`);
    if (!cur) return;
    const lineH = parseFloat(getComputedStyle($textBlock).lineHeight) || 38;
    const target = Math.max(0, cur.offsetTop - lineH * 0.6);
    $textBlock.style.transform = `translateY(-${target}px)`;
  }

  // ─── Stats ───────────────────────────────────────────────────
  function calcWPM() {
    if (!S.startTime) return 0;
    const mins    = (Date.now() - S.startTime) / 60000;
    const correct = S.status.slice(0, S.pos).filter(x => x === 'correct').length;
    return Math.round((correct / 5) / Math.max(mins, 0.001));
  }

  function calcAcc() {
    const typed = S.status.slice(0, S.pos).filter(x => x !== null);
    if (!typed.length) return 100;
    return Math.round(typed.filter(x => x === 'correct').length / typed.length * 100);
  }

  function refreshStats() {
    const wpm = calcWPM();
    const acc = calcAcc();
    $wpmVal.textContent = wpm;
    $wpmVal.classList.remove('dim');
    $accVal.textContent = acc + '%';
    $accVal.classList.remove('dim');
  }

  // ─── Game lifecycle ──────────────────────────────────────────
  function startGame() {
    if (S.phase === 'active') return;
    S.phase     = 'active';
    S.startTime = Date.now();
    S.timeLeft  = S.timerSec;
    $focusHint.classList.add('hidden');

    // countdown
    S.timerInt = setInterval(() => {
      S.timeLeft = Math.max(0, S.timeLeft - 1);
      $timerVal.textContent = S.timeLeft;
      if (S.timeLeft <= 5) {
        $timerVal.classList.add('timer-low');
      }
      if (S.timeLeft <= 0) finishGame();
    }, 1000);

    // live stats refresh
    S.statsInt = setInterval(refreshStats, 250);
  }

  function finishGame() {
    if (S.phase === 'finished') return;
    S.phase = 'finished';

    clearInterval(S.timerInt);
    clearInterval(S.statsInt);
    S.timerInt = S.statsInt = null;

    // Remove blinking cursor
    const cur = document.getElementById(`c${S.pos}`);
    if (cur) cur.classList.remove('current');

    const wpm   = calcWPM();
    const acc   = calcAcc();
    const chars = S.status.filter(x => x === 'correct').length;

    $rWpm.textContent   = wpm;
    $rAcc.textContent   = acc + '%';
    $rChars.textContent = chars;

    playFinish();
    setTimeout(() => $results.classList.add('visible'), 320);
  }

  function restartGame() {
    clearInterval(S.timerInt);
    clearInterval(S.statsInt);
    S.timerInt = S.statsInt = null;
    S.phase     = 'idle';
    S.pos       = 0;
    S.startTime = null;
    S.timeLeft  = S.timerSec;
    S.focused   = false;

    $timerVal.textContent = S.timerSec;
    $timerVal.classList.remove('timer-low');
    $wpmVal.textContent = '–';
    $wpmVal.classList.add('dim');
    $accVal.textContent = '–';
    $accVal.classList.add('dim');

    $results.classList.remove('visible');
    $focusHint.classList.remove('hidden');
    $textOuter.classList.remove('focused');
    $textBlock.style.transform = 'translateY(0)';

    loadPassage();
    renderText();
  }

  // ─── Input handling ──────────────────────────────────────────
  function handleChar(key) {
    if (S.phase === 'finished') return;
    if (S.pos >= S.chars.length) return;

    if (S.phase === 'idle') {
      focus(true);
      startGame();
    }

    const expected = S.chars[S.pos];
    const correct  = key === expected;
    S.status[S.pos] = correct ? 'correct' : 'wrong';

    setCharClass(S.pos);
    playKeySound(correct);

    // Word-complete chime + ripple when space typed correctly
    if (correct && key === ' ') {
      playWordChime();
      triggerWordRipple(S.pos);
    }

    const prev = S.pos;
    S.pos++;
    moveCursor(prev, S.pos);

    if (S.pos >= S.chars.length) finishGame();
  }

  function handleBackspace() {
    if (S.phase === 'finished') return;
    if (S.pos === 0) return;
    const prev = S.pos;
    S.pos--;
    S.status[S.pos] = null;
    setCharClass(S.pos);
    moveCursor(prev, S.pos);
  }

  function triggerWordRipple(spacePos) {
    // Find the start of the word that just finished
    let start = spacePos - 1;
    while (start > 0 && S.chars[start - 1] !== ' ') start--;
    for (let i = start; i < spacePos; i++) {
      const span = document.getElementById(`c${i}`);
      if (!span) continue;
      span.classList.remove('ripple');
      void span.offsetWidth; // force reflow to restart animation
      span.classList.add('ripple');
      span.addEventListener('animationend', () => span.classList.remove('ripple'), { once: true });
    }
  }

  // ─── Focus management ────────────────────────────────────────
  function focus(on) {
    S.focused = on;
    if (on) {
      $textOuter.classList.add('focused');
      $focusHint.classList.add('hidden');
      $hidden.focus({ preventScroll: true });
    } else {
      $textOuter.classList.remove('focused');
      if (S.phase === 'idle') $focusHint.classList.remove('hidden');
    }
  }

  // ─── Event listeners ─────────────────────────────────────────

  // Desktop keyboard
  document.addEventListener('keydown', (e) => {
    // Allow browser shortcuts
    if (e.ctrlKey || e.metaKey) return;

    if (e.key === 'Tab')    { e.preventDefault(); restartGame(); return; }
    if (e.key === 'Escape') { e.preventDefault(); restartGame(); return; }

    if (e.key === 'Backspace') {
      e.preventDefault();
      handleBackspace();
      return;
    }

    if (e.key.length === 1) {
      // preventDefault stops the character appearing in the hidden input,
      // which prevents the 'input' event from double-firing on desktop.
      e.preventDefault();
      focus(true);
      handleChar(e.key);
    }
  });

  // Mobile: virtual keyboards fire 'input' events instead of reliable keydown
  $hidden.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace') { e.preventDefault(); handleBackspace(); }
    if (e.key === 'Tab')       { e.preventDefault(); restartGame(); }
    if (e.key === 'Escape')    { e.preventDefault(); restartGame(); }
  });

  $hidden.addEventListener('input', (e) => {
    // On desktop e.preventDefault() in keydown already prevents this from firing
    // for printable chars. On mobile it fires here.
    if (e.data) {
      focus(true);
      for (const ch of e.data) handleChar(ch);
    } else if (e.inputType === 'deleteContentBackward') {
      handleBackspace();
    }
    // Clear input so it doesn't accumulate
    setTimeout(() => { $hidden.value = ''; }, 0);
  });

  // Click text area to focus
  $textOuter.addEventListener('click', () => focus(true));

  // Click outside to unfocus (only when idle)
  document.addEventListener('click', (e) => {
    if (!$textOuter.contains(e.target) && e.target !== $hidden) {
      if (S.phase === 'idle') focus(false);
    }
  });

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      S.timerSec = parseInt(btn.dataset.sec, 10);
      restartGame();
    });
  });

  // Results: play again
  $playAgain.addEventListener('click', () => {
    restartGame();
    focus(true);
  });

  // ─── Dust particles ──────────────────────────────────────────
  (function createDust() {
    const layer = document.getElementById('dustLayer');
    for (let i = 0; i < 16; i++) {
      const el = document.createElement('div');
      el.className = 'dust';
      const size  = (0.7 + Math.random() * 2.4).toFixed(1);
      const opac  = (0.04 + Math.random() * 0.13).toFixed(3);
      const dur   = (16 + Math.random() * 30).toFixed(1);
      const delay = (-Math.random() * 40).toFixed(1);
      const dx    = ((Math.random() - 0.5) * 180).toFixed(0);
      el.style.cssText =
        `left:${(Math.random() * 100).toFixed(1)}%;` +
        `--s:${size}px;--o:${opac};--d:${dur}s;--dl:${delay}s;--dx:${dx}px;`;
      layer.appendChild(el);
    }
  })();

  // ─── Init ────────────────────────────────────────────────────
  loadPassage();
  renderText();
  </script>

</body>
</html>
