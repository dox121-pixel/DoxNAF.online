<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSE — Auto Survivor | DoxNAF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07030f;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
    }

    /* Back button */
    #back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 100;
      background: rgba(7,3,15,0.75);
      border: 1px solid rgba(124,77,255,0.4);
      color: #c4aed0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, color 0.2s;
    }
    #back-btn:hover { border-color: #7c4dff; color: #fff; }
  </style>
</head>
<body>
  <a href="/" id="back-btn">← DoxNAF</a>
  <canvas id="c"></canvas>

  <script>
  // ─────────────────────────────────────────────
  //  PULSE  —  Auto Survivor
  //  A roguelite where weapons fire automatically.
  //  Survive waves of enemies and level up.
  // ─────────────────────────────────────────────

  const C   = document.getElementById('c');
  const ctx = C.getContext('2d');

  let W = 0, H = 0;

  function resize() {
    W = C.width  = window.innerWidth;
    H = C.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ─── INPUT ───────────────────────────────────
  const keys = new Set();
  document.addEventListener('keydown', e => keys.add(e.code));
  document.addEventListener('keyup',   e => keys.delete(e.code));

  // Mouse position (used by aimed weapons)
  let mx = W / 2, my = H / 2;
  C.addEventListener('mousemove', e => {
    const r = C.getBoundingClientRect();
    mx = (e.clientX - r.left) * (W / r.width);
    my = (e.clientY - r.top)  * (H / r.height);
  });

  // Touch joystick for mobile
  let joystick = null; // { id, ox, oy, dx, dy }
  C.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    joystick = { id: t.identifier, ox: t.clientX, oy: t.clientY, dx: 0, dy: 0 };
  }, { passive: false });
  C.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!joystick) return;
    for (const t of e.changedTouches) {
      if (t.identifier === joystick.id) {
        joystick.dx = t.clientX - joystick.ox;
        joystick.dy = t.clientY - joystick.oy;
      }
    }
  }, { passive: false });
  C.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (joystick && t.identifier === joystick.id) joystick = null;
    }
  }, { passive: false });

  // ─── GAME STATE ───────────────────────────────
  let gs        = 'menu'; // 'menu' | 'playing' | 'levelup' | 'dead'
  let player, enemies, bullets, xpOrbs, particles;
  let score, gameTime, wave, xp, xpToNext, lvl;
  let spawnTimer, waveTimer;
  let upgradeChoices = [];
  let highScore = +(localStorage.getItem('pulse_hs') || 0);
  let hoverCard = -1; // which upgrade card the mouse is over

  // Screen shake
  let shakeAmt = 0, shakeDur = 0, shakeX = 0, shakeY = 0;

  // ─── POLISH SYSTEMS ──────────────────────────
  let kills        = 0;
  let waveAnnounce = { active: false, timer: 0, wave: 0 };
  let floatingTexts = [];
  let comboCount   = 0, comboTimer = 0;
  let damageTint   = 0; // red flash on damage

  // ─── PLAYER ──────────────────────────────────
  const PLAYER_RADIUS  = 14;
  const BASE_SPEED     = 190;
  const INVINCIBLE_MS  = 1400;

  function makePlayer() {
    return {
      x: W / 2, y: H / 2,
      hp: 3, maxHp: 3,
      invTimer: 0,
      speed: BASE_SPEED,
      damage: 1,
      bulletSize: 1,
      piercing: false,
      pickupRadius: 45,
      // Weapons: each fires on its own timer
      weapons: [
        { type: 'pulse', timer: 0, interval: 1700, lvl: 1 }
      ],
      // Orbital shields
      orbitals: [],
      orbitAngle: 0,
      // Trail
      trail: [],
    };
  }

  function updatePlayer(dt) {
    const p = player;

    // ── Movement ──
    let dx = 0, dy = 0;
    if (keys.has('ArrowLeft') || keys.has('KeyA')) dx -= 1;
    if (keys.has('ArrowRight') || keys.has('KeyD')) dx += 1;
    if (keys.has('ArrowUp')   || keys.has('KeyW')) dy -= 1;
    if (keys.has('ArrowDown') || keys.has('KeyS')) dy += 1;

    // Joystick
    if (joystick) {
      const jl = Math.sqrt(joystick.dx * joystick.dx + joystick.dy * joystick.dy);
      if (jl > 8) {
        dx = joystick.dx / Math.min(jl, 60);
        dy = joystick.dy / Math.min(jl, 60);
      }
    }

    const mag = Math.sqrt(dx * dx + dy * dy);
    if (mag > 0) { dx /= mag; dy /= mag; }

    p.x = Math.max(PLAYER_RADIUS, Math.min(W - PLAYER_RADIUS, p.x + dx * p.speed * dt));
    p.y = Math.max(PLAYER_RADIUS, Math.min(H - PLAYER_RADIUS, p.y + dy * p.speed * dt));

    // Trail
    p.trail.unshift({ x: p.x, y: p.y });
    if (p.trail.length > 14) p.trail.pop();

    // Invincibility
    if (p.invTimer > 0) p.invTimer -= dt * 1000;

    // Orbitals
    p.orbitAngle += dt * 2.8;
    p.orbitals.forEach((o, i) => {
      const a = p.orbitAngle + (i / p.orbitals.length) * Math.PI * 2;
      o.x = p.x + Math.cos(a) * 38;
      o.y = p.y + Math.sin(a) * 38;
    });

    // Weapons auto-fire
    const near = nearestEnemy(p.x, p.y);
    p.weapons.forEach(w => {
      w.timer += dt * 1000;
      if (w.timer >= w.interval) {
        w.timer = 0;
        fireWeapon(p, w, near);
      }
    });
  }

  function fireWeapon(p, w, near) {
    switch (w.type) {
      case 'pulse': {
        const dirs = w.lvl >= 2 ? 8 : 4;
        const rot  = performance.now() * 0.0004; // slow rotation for visual flair
        for (let i = 0; i < dirs; i++) {
          const a = rot + (i / dirs) * Math.PI * 2;
          spawnBullet(p, a, 'pulse');
        }
        break;
      }
      case 'shotgun': {
        if (!near) return;
        const base = Math.atan2(near.y - p.y, near.x - p.x);
        for (let i = -2; i <= 2; i++) spawnBullet(p, base + i * 0.18, 'shotgun');
        break;
      }
      case 'sniper': {
        if (!near) return;
        spawnBullet(p, Math.atan2(near.y - p.y, near.x - p.x), 'sniper');
        break;
      }
      case 'whip': {
        // 360° rotating beam — burst in current direction
        const a = performance.now() * 0.002;
        for (let i = 0; i < 2; i++) spawnBullet(p, a + i * Math.PI, 'whip');
        break;
      }
    }
  }

  // ─── BULLETS ─────────────────────────────────
  const BULLET_DEFS = {
    pulse:  { speed: 430,  dmgMul: 1,   radMul: 1,    color: '#00e5ff', glow: '#00b8d4', life: 1.6,  pierce: false },
    shotgun:{ speed: 380,  dmgMul: 0.65,radMul: 0.85, color: '#ffb74d', glow: '#ff8f00', life: 0.75, pierce: false },
    sniper: { speed: 720,  dmgMul: 3,   radMul: 1.6,  color: '#ff4081', glow: '#c51162', life: 2.5,  pierce: true  },
    whip:   { speed: 280,  dmgMul: 1.4, radMul: 1.2,  color: '#e040fb', glow: '#aa00ff', life: 1.0,  pierce: false },
  };

  function spawnBullet(p, angle, type) {
    const d = BULLET_DEFS[type];
    bullets.push({
      x: p.x, y: p.y,
      vx: Math.cos(angle) * d.speed,
      vy: Math.sin(angle) * d.speed,
      r:   5 * p.bulletSize * d.radMul,
      dmg: p.damage * d.dmgMul,
      color: d.color, glow: d.glow,
      life: d.life,
      maxLife: d.life,
      pierce: p.piercing || d.pierce,
      hit: false, dead: false,
    });
  }

  // ─── ENEMIES ─────────────────────────────────
  const ENEMY_TYPES = [
    {
      name: 'Chaser', shape: 'circle',
      color: '#ff5252', glow: '#d50000',
      r: 12, hp: 1, speed: 88, xp: 1, wave: 1,
    },
    {
      name: 'Speeder', shape: 'diamond',
      color: '#ffd740', glow: '#ffc400',
      r: 9, hp: 1, speed: 185, xp: 2, wave: 2,
    },
    {
      name: 'Tank', shape: 'circle',
      color: '#7c4dff', glow: '#651fff',
      r: 23, hp: 8, speed: 48, xp: 5, wave: 3,
    },
    {
      name: 'Bomber', shape: 'star',
      color: '#ff6d00', glow: '#e65100',
      r: 15, hp: 3, speed: 72, xp: 3, wave: 4,
      onDeath: 'explode',
    },
    {
      name: 'Phantom', shape: 'tri',
      color: '#64ffda', glow: '#00bfa5',
      r: 11, hp: 2, speed: 135, xp: 3, wave: 5,
      phaseChance: 0.25,
    },
    {
      name: 'Swarm', shape: 'diamond',
      color: '#ff80ab', glow: '#f50057',
      r: 7, hp: 1, speed: 215, xp: 1, wave: 2,
    },
    {
      name: 'Bruiser', shape: 'circle',
      color: '#e040fb', glow: '#aa00ff',
      r: 18, hp: 5, speed: 65, xp: 4, wave: 6,
    },
  ];

  function spawnEnemyBatch() {
    const count = Math.max(1, Math.floor(1 + wave * 0.5));
    const pool  = ENEMY_TYPES.filter(t => t.wave <= wave);
    for (let i = 0; i < count; i++) {
      spawnEnemy(pool[Math.floor(Math.random() * pool.length)]);
    }
  }

  function spawnEnemy(type) {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if      (side === 0) { x = -60;    y = Math.random() * H; }
    else if (side === 1) { x = W + 60; y = Math.random() * H; }
    else if (side === 2) { x = Math.random() * W; y = -60; }
    else                 { x = Math.random() * W; y = H + 60; }

    const wm = 1 + (wave - 1) * 0.18;
    enemies.push({
      x, y, type: type.name,
      color: type.color, glow: type.glow, shape: type.shape,
      r:     type.r,
      hp:    Math.ceil(type.hp * wm),
      maxHp: Math.ceil(type.hp * wm),
      speed: type.speed * (0.88 + Math.random() * 0.24),
      xp:    type.xp,
      onDeath:    type.onDeath    || null,
      phaseChance:type.phaseChance|| 0,
      flashTimer: 0,
      wobble: Math.random() * Math.PI * 2,
      dead: false,
    });
  }

  function updateEnemies(dt) {
    for (const e of enemies) {
      if (e.dead) continue;
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d > 0) {
        e.x += (dx / d) * e.speed * dt;
        e.y += (dy / d) * e.speed * dt;
      }
      e.wobble += dt * 3;
      if (e.flashTimer > 0) e.flashTimer -= dt * 1000;

      // Player collision
      if (d < PLAYER_RADIUS + e.r - 4) hurtPlayer();

      // Orbital collision
      for (const o of player.orbitals) {
        const od = Math.hypot(o.x - e.x, o.y - e.y);
        if (od < 8 + e.r) hurtEnemy(e, 2);
      }
    }
  }

  function hurtEnemy(e, dmg) {
    if (e.phaseChance > 0 && Math.random() < e.phaseChance) return;
    e.hp -= dmg;
    e.flashTimer = 110;
    if (e.hp <= 0) killEnemy(e);
  }

  function killEnemy(e) {
    e.dead = true;
    kills++;
    const pts = e.xp * wave;
    score += pts;

    // Combo tracking
    comboCount++;
    comboTimer = 2000;

    // Floating score text
    floatingTexts.push({
      x: e.x, y: e.y - e.r - 8,
      text: comboCount >= 3 ? `+${pts} x${comboCount}` : `+${pts}`,
      color: comboCount >= 5 ? '#ffd740' : comboCount >= 3 ? '#ffb74d' : '#00e5ff',
      size: comboCount >= 3 ? 15 : 12,
      vy: -55, life: 1.0,
    });

    // XP drops
    for (let i = 0; i < e.xp; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 40 + Math.random() * 40;
      xpOrbs.push({ x: e.x, y: e.y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, dead: false, pulse: Math.random() * Math.PI * 2 });
    }
    burst(e.x, e.y, 8, e.color, 55 + e.r * 2);
    if (e.onDeath === 'explode') {
      burst(e.x, e.y, 18, '#ff6d00', 110);
      shake(6, 250);
      for (const o of enemies) {
        if (o.dead || o === e) continue;
        if (Math.hypot(o.x - e.x, o.y - e.y) < 90) hurtEnemy(o, 3);
      }
    }
  }

  // ─── BULLET COLLISIONS ───────────────────────
  function updateBullets(dt) {
    for (const b of bullets) {
      if (b.dead) continue;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;

      if (b.life <= 0 || b.x < -200 || b.x > W+200 || b.y < -200 || b.y > H+200) {
        b.dead = true; continue;
      }

      for (const e of enemies) {
        if (e.dead || (b.hit && !b.pierce)) continue;
        if (Math.hypot(b.x - e.x, b.y - e.y) < b.r + e.r) {
          hurtEnemy(e, b.dmg);
          burst(b.x, b.y, 3, b.color, 28);
          b.hit = true;
          if (!b.pierce) { b.dead = true; break; }
        }
      }
    }
  }

  // ─── XP ORBS ─────────────────────────────────
  function updateXPOrbs(dt) {
    for (const o of xpOrbs) {
      if (o.dead) continue;
      o.vx *= 0.82; o.vy *= 0.82;
      o.x += o.vx * dt; o.y += o.vy * dt;
      o.pulse = (o.pulse || 0) + dt * 4;

      const dx = player.x - o.x;
      const dy = player.y - o.y;
      const d  = Math.hypot(dx, dy);

      if (d < player.pickupRadius) {
        const pull = Math.max(220, (player.pickupRadius - d) * 6);
        if (d > 0) { o.x += (dx / d) * pull * dt; o.y += (dy / d) * pull * dt; }
        if (d < 14) {
          o.dead = true;
          gainXP(1);
          burst(o.x, o.y, 2, '#ffb74d', 20);
        }
      }
    }
  }

  function gainXP(n) {
    xp += n;
    if (xp >= xpToNext) {
      xp -= xpToNext;
      lvl++;
      xpToNext = Math.floor(xpToNext * 1.3) + 5;
      triggerLevelUp();
    }
  }

  // ─── PARTICLES ───────────────────────────────
  function burst(x, y, count, color, speed) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * speed;
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        color,
        r: Math.random() * 3 + 1,
        life: 1,
        decay: 1.2 + Math.random() * 0.8,
        spark: Math.random() > 0.5,
      });
    }
    if (particles.length > 800) particles.splice(0, particles.length - 800);
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= 0.90; p.vy *= 0.90;
      p.life -= p.decay * dt;
      p.r    *= 0.97;
    }
  }

  // ─── FLOATING TEXTS ──────────────────────────
  function updateFloatingTexts(dt) {
    for (const ft of floatingTexts) {
      ft.y += ft.vy * dt;
      ft.vy *= 0.94;
      ft.life -= dt * 1.1;
    }
    floatingTexts = floatingTexts.filter(ft => ft.life > 0);
  }

  // ─── SCREEN SHAKE ────────────────────────────
  function shake(amount, duration) {
    shakeAmt = Math.max(shakeAmt, amount);
    shakeDur = Math.max(shakeDur, duration);
  }

  function updateShake(dt) {
    if (shakeDur > 0) {
      shakeDur -= dt * 1000;
      shakeX = (Math.random() - 0.5) * shakeAmt;
      shakeY = (Math.random() - 0.5) * shakeAmt;
      if (shakeDur <= 0) { shakeAmt = 0; shakeX = shakeY = 0; }
    }
  }

  // ─── UPGRADES ────────────────────────────────
  const UPGRADES = [
    {
      id: 'dmg', name: 'Overload', icon: '⚡', color: '#ff4081',
      desc: '+1 bullet damage',
      apply: p => p.damage++,
    },
    {
      id: 'speed', name: 'Overdrive', icon: '💨', color: '#00e5ff',
      desc: 'Move 20% faster',
      apply: p => p.speed *= 1.2,
    },
    {
      id: 'firerate', name: 'Rapid Fire', icon: '🔥', color: '#ffb74d',
      desc: 'All weapons fire 25% faster',
      apply: p => p.weapons.forEach(w => w.interval *= 0.75),
    },
    {
      id: 'bigbullet', name: 'Mass Driver', icon: '🔮', color: '#7c4dff',
      desc: 'Bullets are 50% bigger',
      apply: p => p.bulletSize *= 1.5,
    },
    {
      id: 'pierce', name: 'Piercing', icon: '🗡️', color: '#76ff03',
      desc: 'Bullets pierce through enemies',
      apply: p => p.piercing = true,
    },
    {
      id: 'magnet', name: 'Attractor', icon: '🧲', color: '#18ffff',
      desc: 'XP collection range +70px',
      apply: p => p.pickupRadius += 70,
    },
    {
      id: 'hp', name: 'Regenerator', icon: '❤️', color: '#ff5252',
      desc: '+1 max HP and heal 1',
      apply: p => { p.maxHp++; p.hp = Math.min(p.hp + 1, p.maxHp); },
    },
    {
      id: 'orbital', name: 'Orbital Shield', icon: '🛡️', color: '#aa00ff',
      desc: 'Add a rotating shield orb that damages enemies',
      apply: p => p.orbitals.push({ x: p.x, y: p.y }),
    },
    {
      id: 'shotgun', name: 'Scatter Shot', icon: '💥', color: '#ffb74d',
      desc: p => p.weapons.find(w => w.type === 'shotgun') ? 'Shotgun damage +1' : 'Add Shotgun weapon',
      apply: p => {
        const w = p.weapons.find(x => x.type === 'shotgun');
        if (w) p.damage++;
        else p.weapons.push({ type: 'shotgun', timer: 0, interval: 1900, lvl: 1 });
      },
    },
    {
      id: 'sniper', name: 'Railgun', icon: '🎯', color: '#ff4081',
      desc: p => p.weapons.find(w => w.type === 'sniper') ? 'Railgun fires 20% faster' : 'Add Railgun (3× damage, piercing)',
      apply: p => {
        const w = p.weapons.find(x => x.type === 'sniper');
        if (w) w.interval *= 0.8;
        else p.weapons.push({ type: 'sniper', timer: 0, interval: 3200, lvl: 1 });
      },
    },
    {
      id: 'whip', name: 'Lash', icon: '✨', color: '#e040fb',
      desc: p => p.weapons.find(w => w.type === 'whip') ? 'Lash damage +1' : 'Add spinning Lash weapon',
      apply: p => {
        const w = p.weapons.find(x => x.type === 'whip');
        if (w) p.damage++;
        else p.weapons.push({ type: 'whip', timer: 0, interval: 800, lvl: 1 });
      },
    },
    {
      id: 'pulse8', name: 'Pulse+', icon: '✦', color: '#00e5ff',
      desc: 'Pulse fires in 8 directions',
      apply: p => {
        const w = p.weapons.find(x => x.type === 'pulse');
        if (w) w.lvl = Math.max(w.lvl, 2);
      },
    },
    {
      id: 'heal', name: 'Surge Heal', icon: '💊', color: '#69ff47',
      desc: 'Restore 2 HP immediately',
      apply: p => { p.hp = Math.min(p.hp + 2, p.maxHp); },
    },
    {
      id: 'blitz', name: 'Blitz Mode', icon: '🌀', color: '#ffd740',
      desc: 'Move & fire 15% faster',
      apply: p => { p.speed *= 1.15; p.weapons.forEach(w => w.interval *= 0.85); },
    },
  ];

  function triggerLevelUp() {
    gs = 'levelup';
    const shuffled = [...UPGRADES].sort(() => Math.random() - 0.5);
    upgradeChoices = shuffled.slice(0, 3);
    hoverCard = -1;
  }

  function selectUpgrade(i) {
    if (upgradeChoices[i]) {
      upgradeChoices[i].apply(player);
      gs = 'playing';
    }
  }

  // ─── UTILS ───────────────────────────────────
  function nearestEnemy(px, py) {
    let best = null, bestD = Infinity;
    for (const e of enemies) {
      if (e.dead) continue;
      const d = Math.hypot(e.x - px, e.y - py);
      if (d < bestD) { bestD = d; best = e; }
    }
    return best;
  }

  function hurtPlayer() {
    if (player.invTimer > 0) return;
    player.hp--;
    player.invTimer = INVINCIBLE_MS;
    shake(9, 350);
    damageTint = 0.5;
    burst(player.x, player.y, 14, '#ff5252', 90);
    if (player.hp <= 0) endGame();
  }

  // ─── LIFECYCLE ───────────────────────────────
  function startGame() {
    player    = makePlayer();
    enemies   = [];
    bullets   = [];
    xpOrbs    = [];
    particles = [];
    floatingTexts = [];
    score     = 0;
    gameTime  = 0;
    wave      = 1;
    xp        = 0;
    xpToNext  = 12;
    lvl       = 1;
    kills     = 0;
    comboCount = 0;
    comboTimer = 0;
    damageTint = 0;
    spawnTimer = 0;
    waveTimer  = 0;
    shakeAmt   = 0;
    shakeDur   = 0;
    waveAnnounce = { active: false, timer: 0, wave: 0 };
    gs = 'playing';
  }

  function endGame() {
    gs = 'dead';
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('pulse_hs', highScore);
    }
  }

  // ─── KEYBOARD GLOBAL ─────────────────────────
  document.addEventListener('keydown', e => {
    if (gs === 'menu' && (e.code === 'Space' || e.code === 'Enter')) { e.preventDefault(); startGame(); }
    if (gs === 'dead' && (e.code === 'Space' || e.code === 'Enter')) { e.preventDefault(); startGame(); }
    if (gs === 'levelup') {
      if (e.key === '1') selectUpgrade(0);
      if (e.key === '2') selectUpgrade(1);
      if (e.key === '3') selectUpgrade(2);
    }
  });

  C.addEventListener('click', e => {
    const r  = C.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (W / r.width);
    const cy = (e.clientY - r.top)  * (H / r.height);

    if (gs === 'menu' || gs === 'dead') { startGame(); return; }

    if (gs === 'levelup') {
      const idx = cardIndexAt(cx, cy);
      if (idx >= 0) selectUpgrade(idx);
    }
  });

  C.addEventListener('mousemove', e => {
    if (gs !== 'levelup') return;
    const r  = C.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (W / r.width);
    const cy = (e.clientY - r.top)  * (H / r.height);
    hoverCard = cardIndexAt(cx, cy);
  });

  function cardIndexAt(cx, cy) {
    const cw  = Math.min(200, (W - 80) / 3);
    const ch  = 270;
    const gap = Math.min(16, (W - cw * 3 - 40) / 2);
    const tot = cw * 3 + gap * 2;
    const sx  = (W - tot) / 2;
    const sy  = H / 2 - ch / 2;
    for (let i = 0; i < 3; i++) {
      const cardX = sx + i * (cw + gap);
      if (cx >= cardX && cx <= cardX + cw && cy >= sy && cy <= sy + ch) return i;
    }
    return -1;
  }

  // ─── UPDATE ──────────────────────────────────
  function update(dt) {
    if (gs !== 'playing') return;

    gameTime  += dt;
    waveTimer += dt * 1000;
    spawnTimer+= dt * 1000;

    // Waves every 30 s
    if (waveTimer >= 30000) {
      waveTimer = 0;
      wave++;
      waveAnnounce = { active: true, timer: 2800, wave };
    }

    // Spawn interval gets shorter as waves increase
    const spawnInterval = Math.max(550, 2400 - wave * 140);
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnEnemyBatch();
    }

    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateXPOrbs(dt);
    updateParticles(dt);
    updateShake(dt);
    updateFloatingTexts(dt);

    // Combo decay
    if (comboTimer > 0) {
      comboTimer -= dt * 1000;
      if (comboTimer <= 0) comboCount = 0;
    }

    // Wave announce timer
    if (waveAnnounce.active) {
      waveAnnounce.timer -= dt * 1000;
      if (waveAnnounce.timer <= 0) waveAnnounce.active = false;
    }

    // Damage tint fade
    if (damageTint > 0) damageTint -= dt * 2;

    // Prune dead objects
    enemies  = enemies.filter(e => !e.dead);
    bullets  = bullets.filter(b => !b.dead);
    xpOrbs   = xpOrbs.filter(o => !o.dead);
    particles= particles.filter(p => p.life > 0);
  }

  // ─── DRAW HELPERS ────────────────────────────
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawGrid() {
    // Base background
    ctx.fillStyle = '#07030f';
    ctx.fillRect(0, 0, W, H);

    // Animated radial glow from center
    const t = performance.now() * 0.001;
    const pulseScale = 0.85 + Math.sin(t * 0.8) * 0.15;
    const rg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.65 * pulseScale);
    rg.addColorStop(0, 'rgba(124,77,255,0.10)');
    rg.addColorStop(0.5, 'rgba(0,229,255,0.03)');
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);

    // Grid lines
    ctx.strokeStyle = 'rgba(124,77,255,0.07)';
    ctx.lineWidth = 1;
    const gridSize = 44;
    for (let x = 0; x < W; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Subtle dots at grid intersections
    ctx.fillStyle = 'rgba(124,77,255,0.14)';
    for (let x = 0; x <= W; x += gridSize) {
      for (let y = 0; y <= H; y += gridSize) {
        ctx.beginPath();
        ctx.arc(x, y, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawVignette() {
    const rg = ctx.createRadialGradient(
      W / 2, H / 2, Math.min(W, H) * 0.32,
      W / 2, H / 2, Math.max(W, H) * 0.76
    );
    rg.addColorStop(0, 'rgba(0,0,0,0)');
    rg.addColorStop(1, 'rgba(0,0,0,0.60)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);
  }

  // ─── DRAW GAME ENTITIES ──────────────────────
  function drawXPOrbs() {
    const t = performance.now() * 0.004;
    ctx.save();
    for (const o of xpOrbs) {
      if (o.dead) continue;
      const pulseFactor = 0.85 + Math.sin((o.pulse || 0) + t) * 0.15;
      ctx.shadowBlur = 16 * pulseFactor;
      ctx.shadowColor = '#ffb74d';
      ctx.globalAlpha = 0.92;
      ctx.fillStyle = '#ffb74d';
      ctx.beginPath();
      ctx.arc(o.x, o.y, 5 * pulseFactor, 0, Math.PI * 2);
      ctx.fill();
      // Inner bright core
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff8e1';
      ctx.beginPath();
      ctx.arc(o.x, o.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawEnemies() {
    for (const e of enemies) {
      if (e.dead) continue;
      const flash = e.flashTimer > 0;
      ctx.save();
      ctx.shadowBlur = flash ? 32 : 16;
      ctx.shadowColor = flash ? '#ffffff' : e.glow;
      ctx.translate(e.x, e.y);
      ctx.beginPath();

      if (e.shape === 'circle') {
        ctx.arc(0, 0, e.r, 0, Math.PI * 2);
      } else if (e.shape === 'diamond') {
        ctx.moveTo(0, -e.r); ctx.lineTo(e.r, 0);
        ctx.lineTo(0, e.r);  ctx.lineTo(-e.r, 0);
        ctx.closePath();
      } else if (e.shape === 'tri') {
        const a = Math.atan2(player.y - e.y, player.x - e.x);
        ctx.moveTo(Math.cos(a)*e.r,       Math.sin(a)*e.r);
        ctx.lineTo(Math.cos(a+2.3)*e.r,   Math.sin(a+2.3)*e.r);
        ctx.lineTo(Math.cos(a-2.3)*e.r,   Math.sin(a-2.3)*e.r);
        ctx.closePath();
      } else if (e.shape === 'star') {
        const ir = e.r * 0.45, rot = e.wobble;
        for (let i = 0; i < 5; i++) {
          const ao = rot + (i / 5) * Math.PI * 2;
          const bo = rot + ((i + 0.5) / 5) * Math.PI * 2;
          if (i === 0) ctx.moveTo(Math.cos(ao)*e.r, Math.sin(ao)*e.r);
          else         ctx.lineTo(Math.cos(ao)*e.r, Math.sin(ao)*e.r);
          ctx.lineTo(Math.cos(bo)*ir, Math.sin(bo)*ir);
        }
        ctx.closePath();
      }

      ctx.fillStyle = flash ? '#ffffff' : e.color;
      ctx.fill();

      // HP bar (shown when below max HP)
      if (e.hp < e.maxHp) {
        ctx.shadowBlur = 0;
        const bw = e.r * 2 + 4, bh = 4, bx = -e.r - 2, by = -e.r - 12;
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(bx, by, bw, bh);
        const frac = e.hp / e.maxHp;
        ctx.fillStyle = frac > 0.5 ? '#76ff03' : frac > 0.25 ? '#ffb74d' : '#ff5252';
        ctx.fillRect(bx, by, bw * frac, bh);
      }
      ctx.restore();
    }
  }

  function drawBullets() {
    for (const b of bullets) {
      if (b.dead) continue;
      const lifeFrac = b.life / (b.maxLife || 1.6);
      ctx.save();
      ctx.globalAlpha = Math.min(1, lifeFrac * 2.5);
      ctx.shadowBlur = 22;
      ctx.shadowColor = b.glow;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = b.color;
      ctx.fill();
      // Bright white core
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.75 * Math.min(1, lifeFrac * 2.5);
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r * 0.38, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      if (p.life <= 0) continue;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life * 0.85);
      ctx.shadowBlur  = 6;
      ctx.shadowColor = p.color;
      ctx.fillStyle   = p.color;
      if (p.spark) {
        // Elongated spark shape
        ctx.translate(p.x, p.y);
        ctx.rotate(Math.atan2(p.vy, p.vx));
        ctx.fillRect(-p.r * 2, -p.r * 0.4, p.r * 4, p.r * 0.8);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawPlayer() {
    const p = player;
    const blink = p.invTimer > 0 && Math.floor(p.invTimer / 90) % 2 === 0;
    if (blink) return;

    // Orbitals
    ctx.save();
    ctx.shadowBlur  = 22;
    ctx.shadowColor = '#7c4dff';
    for (const o of p.orbitals) {
      const og = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, 12);
      og.addColorStop(0, '#c77dff');
      og.addColorStop(1, 'rgba(170,0,255,0)');
      ctx.beginPath();
      ctx.arc(o.x, o.y, 12, 0, Math.PI * 2);
      ctx.fillStyle = og;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(o.x, o.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#9d6fff';
      ctx.fill();
    }
    ctx.restore();

    // Trail
    for (let i = p.trail.length - 1; i >= 0; i--) {
      const tr = p.trail[i];
      const frac = 1 - i / p.trail.length;
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, PLAYER_RADIUS * frac * 0.9, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,229,255,${frac * 0.28})`;
      ctx.fill();
    }

    // Pulsing glow + body
    const t = performance.now() * 0.002;
    const glowPulse = 24 + Math.sin(t) * 8;
    ctx.save();
    ctx.shadowBlur  = glowPulse;
    ctx.shadowColor = '#00e5ff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(p.x - 4, p.y - 4, 2, p.x, p.y, PLAYER_RADIUS);
    g.addColorStop(0, '#80ffff');
    g.addColorStop(0.5, '#00e5ff');
    g.addColorStop(1, '#006888');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.shadowBlur = 0;
    // White core highlight
    ctx.beginPath();
    ctx.arc(p.x - 4, p.y - 4, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();
    ctx.restore();
  }

  function drawFloatingTexts() {
    for (const ft of floatingTexts) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, ft.life);
      ctx.textAlign = 'center';
      ctx.font = `bold ${ft.size || 12}px "JetBrains Mono", monospace`;
      ctx.fillStyle = ft.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = ft.color;
      ctx.fillText(ft.text, ft.x, ft.y);
      ctx.restore();
    }
  }

  function drawHUD() {
    // ── Timer (top center) ──
    const mins = String(Math.floor(gameTime / 60)).padStart(1, '0');
    const secs = String(Math.floor(gameTime % 60)).padStart(2, '0');
    ctx.save();
    ctx.textAlign = 'center';
    ctx.shadowBlur = 16;
    ctx.shadowColor = '#00e5ff';
    ctx.font = 'bold 32px "JetBrains Mono", monospace';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(`${mins}:${secs}`, W / 2, 42);
    ctx.restore();
    ctx.textAlign = 'center';
    ctx.shadowBlur = 0;
    ctx.font = '12px "JetBrains Mono", monospace';
    ctx.fillStyle = '#7c4dff';
    ctx.fillText(`WAVE  ${wave}`, W / 2, 62);

    // ── Score (top right) ──
    ctx.textAlign = 'right';
    ctx.font = 'bold 20px "JetBrains Mono", monospace';
    ctx.fillStyle = '#ffb74d';
    ctx.fillText(score.toLocaleString(), W - 18, 36);
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.fillStyle = '#555';
    ctx.fillText('SCORE', W - 18, 50);

    // Kill counter
    ctx.font = 'bold 14px "JetBrains Mono", monospace';
    ctx.fillStyle = '#ff5252';
    ctx.fillText('\u2694 ' + kills, W - 18, 68);
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.fillStyle = '#555';
    ctx.fillText('KILLS', W - 18, 82);

    // ── HP (top left) ──
    ctx.textAlign = 'left';
    for (let i = 0; i < player.maxHp; i++) {
      const active = i < player.hp;
      ctx.save();
      if (active) { ctx.shadowBlur = 12; ctx.shadowColor = '#ff5252'; }
      ctx.font = '26px serif';
      ctx.fillStyle = active ? '#ff5252' : 'rgba(255,82,82,0.18)';
      ctx.fillText('\u2665', 14 + i * 30, 40);
      ctx.restore();
    }

    // ── Level & XP bar ──
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.fillStyle = '#666';
    ctx.fillText(`LV ${lvl}`, 14, 56);

    const barX = 14, barY = 62, barW = 150, barH = 5;
    ctx.fillStyle = '#1a0d35';
    ctx.beginPath();
    roundRect(barX, barY, barW, barH, 3);
    ctx.fill();

    const xpFrac = Math.min(1, xp / xpToNext);
    if (xpFrac > 0) {
      ctx.save();
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00e5ff';
      ctx.fillStyle = '#00e5ff';
      ctx.beginPath();
      roundRect(barX, barY, barW * xpFrac, barH, 3);
      ctx.fill();
      ctx.restore();
    }

    // ── Combo indicator (bottom center) ──
    if (comboCount >= 3 && comboTimer > 0) {
      const comboAlpha = Math.min(1, comboTimer / 500);
      ctx.save();
      ctx.globalAlpha = comboAlpha;
      ctx.textAlign = 'center';
      ctx.font = `bold ${18 + Math.min(comboCount, 10)}px "JetBrains Mono", monospace`;
      ctx.fillStyle = comboCount >= 8 ? '#ffd740' : comboCount >= 5 ? '#ffb74d' : '#ff4081';
      ctx.shadowBlur = 20;
      ctx.shadowColor = ctx.fillStyle;
      ctx.fillText(`COMBO x${comboCount}`, W / 2, H - 30);
      ctx.restore();
    }

    // ── Mobile joystick indicator ──
    if (joystick) {
      const jx = joystick.ox, jy = joystick.oy;
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.beginPath();
      ctx.arc(jx, jy, 45, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      const dl = Math.min(Math.hypot(joystick.dx, joystick.dy), 45);
      const da = Math.atan2(joystick.dy, joystick.dx);
      ctx.beginPath();
      ctx.arc(jx + Math.cos(da)*dl, jy + Math.sin(da)*dl, 20, 0, Math.PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.restore();
    }

    // ── Damage tint overlay ──
    if (damageTint > 0) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, damageTint) * 0.28;
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }

  function drawWaveAnnounce() {
    if (!waveAnnounce.active) return;
    // t goes from 1 (just triggered) down to 0 (expired)
    const t = waveAnnounce.timer / 2800;
    // Fade in for first 30%, hold, fade out for last 15%
    const alpha = t > 0.7
      ? ((1 - t) / 0.3)
      : t < 0.15
        ? (t / 0.15)
        : 1;
    const scale = 0.80 + (1 - t) * 0.20;

    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.textAlign = 'center';
    ctx.translate(W / 2, H / 2);
    ctx.scale(scale, scale);

    ctx.shadowBlur = 60;
    ctx.shadowColor = '#7c4dff';
    ctx.font = 'bold 20px "JetBrains Mono", monospace';
    ctx.fillStyle = '#c4a0ff';
    ctx.fillText('WAVE', 0, -24);

    ctx.shadowBlur = 80;
    ctx.shadowColor = '#7c4dff';
    ctx.font = `bold ${Math.min(120, Math.floor(W / 5))}px Inter, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.fillText(waveAnnounce.wave, 0, 62);

    ctx.restore();
  }

  function drawLevelUp() {
    const t = performance.now() * 0.001;
    // Dimmed backdrop
    ctx.fillStyle = 'rgba(0,0,0,0.84)';
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.textAlign = 'center';
    ctx.save();
    ctx.shadowBlur = 50;
    ctx.shadowColor = '#00e5ff';
    ctx.font = 'bold 42px Inter, sans-serif';
    ctx.fillStyle = '#00e5ff';
    ctx.fillText('LEVEL  UP', W / 2, H / 2 - 172);
    ctx.restore();
    ctx.font = '14px Inter, sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('Choose an upgrade   (or press  1 / 2 / 3)', W / 2, H / 2 - 140);

    const cw  = Math.min(200, (W - 80) / 3);
    const ch  = 270;
    const gap = Math.min(16, (W - cw * 3 - 40) / 2);
    const sx  = (W - (cw * 3 + gap * 2)) / 2;
    const sy  = H / 2 - ch / 2;

    upgradeChoices.forEach((u, i) => {
      const cx  = sx + i * (cw + gap);
      const hov = hoverCard === i;
      const borderPulse = 0.6 + Math.sin(t * 2.5 + i * 1.2) * 0.4;

      ctx.save();
      ctx.shadowBlur  = hov ? 40 : 16;
      ctx.shadowColor = u.color;
      roundRect(cx, sy, cw, ch, 14);

      // Card background gradient
      const bg = ctx.createLinearGradient(cx, sy, cx, sy + ch);
      bg.addColorStop(0, hov ? '#26104c' : '#160b30');
      bg.addColorStop(1, hov ? '#1b0c3a' : '#0d0620');
      ctx.fillStyle = bg;
      ctx.fill();

      // Animated border
      ctx.strokeStyle = u.color;
      ctx.lineWidth   = hov ? 2.5 : 1.5 * borderPulse;
      ctx.globalAlpha = hov ? 1 : 0.7 + borderPulse * 0.3;
      ctx.stroke();
      ctx.restore();

      // Icon background glow
      ctx.save();
      const iconGlow = ctx.createRadialGradient(cx + cw / 2, sy + 58, 0, cx + cw / 2, sy + 58, 36);
      iconGlow.addColorStop(0, u.color + '30');
      iconGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = iconGlow;
      ctx.beginPath();
      ctx.arc(cx + cw / 2, sy + 58, 36, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Icon
      ctx.font = '48px serif';
      ctx.textAlign = 'center';
      ctx.fillText(u.icon, cx + cw / 2, sy + 78);

      // Name
      ctx.save();
      ctx.font = `bold 15px Inter, sans-serif`;
      ctx.fillStyle = u.color;
      ctx.shadowBlur = hov ? 15 : 0;
      ctx.shadowColor = u.color;
      ctx.fillText(u.name, cx + cw / 2, sy + 114);
      ctx.restore();

      // Divider line
      ctx.save();
      ctx.strokeStyle = u.color + '44';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx + 18, sy + 126);
      ctx.lineTo(cx + cw - 18, sy + 126);
      ctx.stroke();
      ctx.restore();

      // Description (auto-wrap)
      const desc = typeof u.desc === 'function' ? u.desc(player) : u.desc;
      ctx.font = '12px Inter, sans-serif';
      ctx.fillStyle = '#aaa';
      wrapText(desc, cx + cw / 2, sy + 148, cw - 24, 18);

      // Key hint
      ctx.font = 'bold 13px "JetBrains Mono", monospace';
      ctx.fillStyle = hov ? u.color : '#444';
      ctx.fillText(`[ ${i + 1} ]`, cx + cw / 2, sy + ch - 14);
    });
  }

  function wrapText(text, cx, y, maxW, lineH) {
    const words = text.split(' ');
    let line = '';
    for (const w of words) {
      const test = line + w + ' ';
      if (ctx.measureText(test).width > maxW && line !== '') {
        ctx.fillText(line.trim(), cx, y);
        line = w + ' '; y += lineH;
      } else { line = test; }
    }
    ctx.fillText(line.trim(), cx, y);
  }

  function drawMenu() {
    drawGrid();
    drawVignette();

    // Animated ambient particles
    ctx.save();
    const t = performance.now() * 0.001;
    for (let i = 0; i < 50; i++) {
      const px = ((Math.sin(i * 1.7 + t * 0.25) * 0.5 + 0.5) * W);
      const py = ((Math.cos(i * 2.3 + t * 0.18) * 0.5 + 0.5) * H);
      const a  = Math.max(0, 0.15 + Math.sin(i + t * 1.5) * 0.12);
      ctx.globalAlpha = a;
      const pr = Math.max(0.3, 1 + Math.sin(i * 0.7 + t) * 0.5);
      ctx.beginPath();
      ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fillStyle = i % 3 === 0 ? '#7c4dff' : i % 3 === 1 ? '#00e5ff' : '#ff4081';
      ctx.fill();
    }
    ctx.restore();

    // Expanding pulse rings
    ctx.save();
    for (let i = 0; i < 3; i++) {
      const progress = ((t * 0.3 + i / 3) % 1);
      const ringR = progress * Math.min(W, H) * 0.55;
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,229,255,${(1 - progress) * 0.08})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();

    ctx.textAlign = 'center';

    // Subtitle
    ctx.font = '13px "JetBrains Mono", monospace';
    ctx.fillStyle = 'rgba(124,77,255,0.85)';
    ctx.fillText('AUTO  SURVIVOR', W / 2, H / 2 - 110);

    // Animated glowing title
    const glowPulse = 55 + Math.sin(t * 1.2) * 25;
    ctx.save();
    ctx.shadowBlur  = glowPulse;
    ctx.shadowColor = '#00e5ff';
    ctx.font = `bold ${Math.min(96, Math.floor(W / 8))}px Inter, sans-serif`;
    ctx.fillStyle = '#00e5ff';
    ctx.fillText('PULSE', W / 2, H / 2 - 38);
    ctx.restore();

    // Tagline
    ctx.font = '14px Inter, sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('survive \u00B7 level up \u00B7 become unstoppable', W / 2, H / 2 + 14);

    // Controls hint
    ctx.font = '14px Inter, sans-serif';
    ctx.fillStyle = '#666';
    ctx.fillText('WASD / Arrow Keys to move   \u2022   Weapons fire automatically', W / 2, H / 2 + 55);

    // Blinking start prompt
    if (Math.floor(performance.now() / 560) % 2 === 0) {
      ctx.save();
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#ffffff';
      ctx.font = 'bold 18px Inter, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Click or press  SPACE  to start', W / 2, H / 2 + 112);
      ctx.restore();
    }

    // High score
    if (highScore > 0) {
      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#ffb74d';
      ctx.font = '14px "JetBrains Mono", monospace';
      ctx.fillStyle = '#ffb74d';
      ctx.fillText('\uD83C\uDFC6  Best:  ' + highScore.toLocaleString(), W / 2, H / 2 + 160);
      ctx.restore();
    }

    // Credit
    ctx.font = '12px Inter, sans-serif';
    ctx.fillStyle = '#333';
    ctx.fillText('a DoxNAF project  \u2022  v2.0', W / 2, H - 22);
  }

  function drawDead() {
    drawGrid();
    drawVignette();

    // Subtle red radial tint
    const rg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
    rg.addColorStop(0, 'rgba(255,0,0,0.07)');
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rg;
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // "ELIMINATED" heading
    ctx.save();
    ctx.shadowBlur  = 45;
    ctx.shadowColor = '#ff0000';
    ctx.font = `bold ${Math.min(68, Math.floor(W / 10))}px Inter, sans-serif`;
    ctx.fillStyle = '#ff5252';
    ctx.fillText('ELIMINATED', W / 2, H / 2 - 132);
    ctx.restore();

    // Divider
    ctx.save();
    ctx.strokeStyle = 'rgba(255,82,82,0.28)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 180, H / 2 - 100);
    ctx.lineTo(W / 2 + 180, H / 2 - 100);
    ctx.stroke();
    ctx.restore();

    // Survival time
    const mins = String(Math.floor(gameTime / 60)).padStart(1, '0');
    const secs = String(Math.floor(gameTime % 60)).padStart(2, '0');
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#aaa';
    ctx.font = `bold ${Math.min(52, Math.floor(W / 14))}px "JetBrains Mono", monospace`;
    ctx.fillStyle = '#ffffff';
    ctx.fillText(`${mins}:${secs}`, W / 2, H / 2 - 46);
    ctx.restore();
    ctx.font = '12px Inter, sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('SURVIVAL TIME', W / 2, H / 2 - 24);

    // Score
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ffb74d';
    ctx.font = `bold ${Math.min(42, Math.floor(W / 16))}px "JetBrains Mono", monospace`;
    ctx.fillStyle = '#ffb74d';
    ctx.fillText(score.toLocaleString(), W / 2, H / 2 + 26);
    ctx.restore();
    ctx.font = '12px Inter, sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText('SCORE', W / 2, H / 2 + 46);

    // Kills / Wave / Level row
    const statsY = H / 2 + 82;
    const statGap = Math.min(120, Math.floor(W / 4));
    const statItems = [
      { label: 'KILLS', value: kills.toString() },
      { label: 'WAVE',  value: wave.toString()  },
      { label: 'LEVEL', value: lvl.toString()   },
    ];
    statItems.forEach((s, i) => {
      const sx = W / 2 + (i - 1) * statGap;
      ctx.font = `bold 20px "JetBrains Mono", monospace`;
      ctx.fillStyle = '#ccc';
      ctx.fillText(s.value, sx, statsY);
      ctx.font = '10px "JetBrains Mono", monospace';
      ctx.fillStyle = '#555';
      ctx.fillText(s.label, sx, statsY + 18);
    });

    // New high score banner
    if (score > 0 && score >= highScore) {
      ctx.save();
      ctx.shadowBlur = 25;
      ctx.shadowColor = '#ffd740';
      ctx.font = 'bold 20px Inter, sans-serif';
      ctx.fillStyle = '#ffd740';
      ctx.fillText('\uD83C\uDFC6  NEW HIGH SCORE!', W / 2, H / 2 + 130);
      ctx.restore();
    }

    // Blinking restart prompt
    if (Math.floor(performance.now() / 560) % 2 === 0) {
      ctx.save();
      ctx.shadowBlur = 14;
      ctx.shadowColor = '#00e5ff';
      ctx.font = 'bold 17px Inter, sans-serif';
      ctx.fillStyle = '#00e5ff';
      ctx.fillText('Click or press  SPACE  to play again', W / 2, H / 2 + 172);
      ctx.restore();
    }
  }

  // ─── RENDER ──────────────────────────────────
  function render() {
    ctx.save();
    ctx.translate(shakeX, shakeY);

    if (gs === 'menu') {
      drawMenu();
    } else if (gs === 'dead') {
      drawDead();
    } else {
      // In-game
      drawGrid();
      drawXPOrbs();
      drawBullets();
      drawEnemies();
      drawParticles();
      drawPlayer();
      drawFloatingTexts();
      drawHUD();
      drawWaveAnnounce();
      if (gs === 'levelup') drawLevelUp();
    }

    ctx.restore();
  }

  // ─── MAIN LOOP ───────────────────────────────
  let lastTS = 0;
  function loop(ts) {
    const dt = Math.min((ts - lastTS) / 1000, 0.05);
    lastTS = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  </script>
</body>
</html>
