<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Play Dox's Unity game directly in your browser." />

  <meta property="og:url" content="https://doxnaf.online/unity-game/" />
  <meta property="og:title" content="DoxNAF.online — Play" />
  <meta property="og:description" content="Play Dox's Unity game directly in your browser." />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LTSJ5GKL0C"></script>

  <style>
    :root {
      --bg:          #1e1528;
      --surface:     rgba(255, 235, 202, 0.044);
      --border:      rgba(200, 165, 122, 0.20);
      --text:        #ede0cc;
      --text-2:      #c4b09c;
      --text-3:      #9e8e7c;
      --text-faint:  #6c5e50;
      --purple:      #c0a0f0;
      --purple-btn:  #8864be;
      --amber:       #d4a46c;
      --rose:        #d09098;
      --shadow:      rgba(0, 0, 0, 0.48);
      --r-sm:        8px;
      --r-pill:      50px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 18% 18%, rgba(190, 130, 60,  0.13) 0%, transparent 44%),
        radial-gradient(ellipse at 82% 82%, rgba(130, 80,  200, 0.14) 0%, transparent 44%),
        radial-gradient(ellipse at 55%  5%, rgba(210, 165, 90,  0.09) 0%, transparent 36%);
      color: var(--text);
      font-family: Georgia, 'Palatino Linotype', Palatino, 'Book Antiqua', serif;
      font-size: 15px;
      line-height: 1.75;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 20px 52px;
    }

    header {
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .site-title {
      font-size: clamp(14px, 3vw, 20px);
      font-weight: normal;
      color: var(--purple);
      text-shadow: 0 1px 12px rgba(170, 120, 250, 0.22);
      text-decoration: none;
      transition: color 0.2s;
    }
    .site-title:hover { color: #d4bcff; }

    .back-link {
      font-size: 13px;
      color: var(--text-3);
      text-decoration: none;
      font-style: italic;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--amber); }

    .divider {
      width: 100%;
      max-width: 960px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin-bottom: 24px;
    }

    .game-title {
      font-size: clamp(18px, 3.5vw, 26px);
      font-weight: normal;
      color: var(--purple);
      text-shadow: 0 1px 16px rgba(170, 120, 250, 0.22);
      margin-bottom: 20px;
      text-align: center;
    }

    /* Unity container */
    #unity-container {
      position: relative;
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      box-shadow: 0 12px 52px var(--shadow), 0 0 80px rgba(130, 80, 200, 0.07);
      overflow: hidden;
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    /* Loading overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      gap: 18px;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: normal;
      color: var(--purple);
      text-shadow: 0 2px 20px rgba(170, 120, 250, 0.26);
    }

    .loading-status {
      font-size: 13px;
      color: var(--text-3);
      font-style: italic;
    }

    .progress-track {
      width: 260px;
      height: 3px;
      background: rgba(200, 165, 122, 0.15);
      border-radius: 3px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--purple-btn), var(--amber));
      border-radius: 3px;
      transition: width 0.2s;
    }

    /* Error overlay */
    #error-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      gap: 12px;
      padding: 32px;
      text-align: center;
    }
    #error-overlay.visible { display: flex; }

    .error-title {
      font-size: 16px;
      font-weight: normal;
      color: var(--rose);
    }

    .error-msg {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.9;
      max-width: 480px;
      font-style: italic;
    }

    /* Controls bar */
    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      max-width: 960px;
      margin-top: 10px;
      gap: 12px;
    }

    .btn-fullscreen {
      font-family: Georgia, serif;
      font-size: 13px;
      background: none;
      border: 1px solid var(--border);
      color: var(--purple);
      padding: 8px 22px;
      cursor: pointer;
      border-radius: var(--r-pill);
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-fullscreen:hover {
      border-color: var(--purple);
      box-shadow: 0 2px 14px rgba(130, 80, 200, 0.25);
    }

    .footer {
      margin-top: 44px;
      font-size: 12px;
      color: var(--text-faint);
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <a class="site-title" href="/">DoxNAF.online</a>
    <a class="back-link" href="/">← back</a>
  </header>

  <div class="divider"></div>

  <div class="game-title" id="game-title">Loading…</div>

  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="loading-overlay">
      <div class="loading-logo" id="loading-logo">DoxNAF</div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="loading-status" id="loading-status">initializing</div>
    </div>

    <div id="error-overlay">
      <div class="error-title">⚠ Failed to load</div>
      <div class="error-msg" id="error-msg">
        The game build could not be loaded. Make sure the Unity WebGL build files
        are placed in the <code>Build/</code> folder and the file names match
        the configuration at the top of this page.
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-fullscreen" id="btn-fullscreen">⛶ fullscreen</button>
  </div>

  <div class="footer">doxnaf.online &nbsp;·&nbsp; all rights reserved</div>

  <!--
    ════════════════════════════════════════════════════════
    UNITY BUILD CONFIGURATION
    ════════════════════════════════════════════════════════
    After exporting your game with File → Build Settings →
    WebGL → Build, copy the generated Build/ folder into
    this directory (unity-game/Build/).

    Then update the four values below to match your export:
      buildName   — the file stem Unity used (e.g. "MyGame")
      gameTitle   — display name shown in the page header
      compressed  — "gzip" | "brotli" | "none"
                    (matches the Compression Format in Unity
                     Player Settings → Publishing Settings)
    ════════════════════════════════════════════════════════
  -->
  <script>
    // ── Configure these to match your Unity export ──
    var UNITY_CONFIG = {
      buildName:  'game',          // stem of the files in Build/
      gameTitle:  'UNNAMED PROJECT',
      compressed: 'none',          // 'gzip' | 'brotli' | 'none'
    };
    // ────────────────────────────────────────────────

    (function () {
      'use strict';

      var cfg    = UNITY_CONFIG;
      var base   = 'Build/' + cfg.buildName;
      var ext    = cfg.compressed === 'gzip'   ? '.gz'
                 : cfg.compressed === 'brotli' ? '.br'
                 : '';

      var loaderUrl = base + '.loader.js';
      var config = {
        dataUrl:       base + '.data'         + ext,
        frameworkUrl:  base + '.framework.js' + ext,
        codeUrl:       base + '.wasm'         + ext,
        streamingAssetsUrl: 'StreamingAssets',
        companyName:   'DoxNAF',
        productName:   cfg.gameTitle,
        productVersion: '1.0',
      };

      // Update visible title
      document.getElementById('game-title').textContent   = cfg.gameTitle;
      document.getElementById('loading-logo').textContent = cfg.gameTitle;

      var canvas         = document.getElementById('unity-canvas');
      var loadingOverlay = document.getElementById('loading-overlay');
      var errorOverlay   = document.getElementById('error-overlay');
      var progressBar    = document.getElementById('progress-bar');
      var loadingStatus  = document.getElementById('loading-status');
      var btnFullscreen  = document.getElementById('btn-fullscreen');

      function showError(msg) {
        loadingOverlay.classList.add('hidden');
        if (msg) document.getElementById('error-msg').textContent = msg;
        errorOverlay.classList.add('visible');
      }

      // Native fullscreen fallback — replaced by Unity's SetFullscreen once loaded.
      btnFullscreen.onclick = function () {
        var el = document.getElementById('unity-container');
        if (el.requestFullscreen)            el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      };

      // Load the Unity loader script
      var script = document.createElement('script');
      script.src = loaderUrl;
      script.onerror = function () {
        showError(
          'Could not load ' + loaderUrl + '. ' +
          'Make sure the Build/ folder is present and the buildName in UNITY_CONFIG matches your export.'
        );
      };
      script.onload = function () {
        if (typeof createUnityInstance !== 'function') {
          showError('createUnityInstance is not defined — the loader script may be corrupt or mismatched.');
          return;
        }
        loadingStatus.textContent = 'loading game';
        createUnityInstance(canvas, config, function (progress) {
          progressBar.style.width = (100 * progress) + '%';
          loadingStatus.textContent = Math.round(progress * 100) + '%';
        }).then(function (unityInstance) {
          loadingOverlay.classList.add('hidden');
          // Replace the native fullscreen handler with Unity's.
          btnFullscreen.onclick = function () { unityInstance.SetFullscreen(1); };
        }).catch(function (err) {
          showError(String(err));
        });
      };
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
