function drawSheet(name, src) {
  const div = document.createElement('div');
  div.className = 'sheet';
  div.innerHTML = '<h3>' + name + '</h3>';
  
  const img = new Image();
  img.src = src;
  img.onload = function() {
    // Draw each cell as a zoomed canvas
    const COLS = Math.min(8, Math.ceil(img.width / 32));
    const ROWS = Math.min(4, Math.ceil(img.height / 32));
    
    for (let row = 0; row < ROWS; row++) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'row';
      for (let col = 0; col < COLS; col++) {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        canvas.title = 'col=' + col + ', row=' + row + ' (x=' + (col*32) + ', y=' + (row*32) + ')';
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(img, col*32, row*32, 32, 32, 0, 0, 64, 64);
        rowDiv.appendChild(canvas);
      }
      div.appendChild(rowDiv);
    }
  };
  
  document.body.appendChild(div);
}

for (const [name, src] of Object.entries(sheets)) {
  drawSheet(name, src);
}
